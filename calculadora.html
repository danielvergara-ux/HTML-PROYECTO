<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Funcional</title>
    <style>
        /* Estilo general inspirado en tu captura de pantalla */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212; /* Fondo oscuro como tu sistema */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculadora-card {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 450px;
            text-align: center;
        }

        .inputs-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        input {
            width: 45%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        .botones-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: #3b82f6; /* Azul similar a la imagen */
            color: white;
            border: none;
            padding: 12px 5px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2563eb;
        }

        .resultado-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="calculadora-card">
        <div class="inputs-container">
            <input type="number" id="num1" placeholder="Primer número">
            <input type="number" id="num2" placeholder="Segundo número">
        </div>

        <div class="botones-container">
            <button onclick="operar('sumar')">Sumar</button>
            <button onclick="operar('restar')">Restar</button>
            <button onclick="operar('multiplicar')">Multiplicar</button>
            <button onclick="operar('dividir')">Dividir</button>
        </div>

        <input type="text" id="resultado" class="resultado-field" placeholder="Resultado" readonly>
    </div>

    <script>
        function operar(operacion) {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const resField = document.getElementById('resultado');

            if (isNaN(n1) || isNaN(n2)) {
                resField.value = "Ingresa ambos números";
                return;
            }

            let resultado;
            switch (operacion) {
                case 'sumar': resultado = n1 + n2; break;
                case 'restar': resultado = n1 - n2; break;
                case 'multiplicar': resultado = n1 * n2; break;
                case 'dividir': 
                    resultado = n2 !== 0 ? n1 / n2 : "Error: Div entre 0"; 
                    break;
            }

            resField.value = resultado;
        }
    </script>
